<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoiLe</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="left">

        <h1 class="logo">SoiLe</h1>

        <h2>Добро пожаловать!</h2>

        <p>Общайся, публикуй фотографии и находи новых друзей.</p>

    </div>

    <div class="right">

        <div class="login-box">

            <h2>Вход</h2>

            <input type="text" placeholder="Имя пользователя">

            <input type="password" placeholder="Пароль">

            <button id="loginBtn">Войти</button>

            <button class="register">Создать аккаунт</button>

        </div>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
