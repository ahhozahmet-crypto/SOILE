<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сообщения | SoiLe</title>

<link rel="stylesheet" href="css/messages.css">
</head>

<body>

<div class="chat">

    <aside class="chat-list">

        <h2>Сообщения</h2>

        <div class="user active">
            <div class="avatar"></div>
            <div>
                <h3>Alex</h3>
                <p>Привет 👋</p>
            </div>
        </div>

        <div class="user">
            <div class="avatar"></div>
            <div>
                <h3>Anna</h3>
                <p>Как дела?</p>
            </div>
        </div>

        <div class="user">
            <div class="avatar"></div>
            <div>
                <h3>Max</h3>
                <p>Спасибо!</p>
            </div>
        </div>

    </aside>

    <main class="chat-window">

        <div class="chat-header">
            <h2>Alex</h2>

            <div class="buttons">
                <button>📞</button>
                <button>📹</button>
            </div>
        </div>

        <div class="messages">

            <div class="message left">
                Привет! Добро пожаловать в SoiLe.
            </div>

            <div class="message right">
                Спасибо! Очень красивый дизайн.
            </div>

        </div>

        <div class="send-box">

            <input
                type="text"
                placeholder="Введите сообщение..."
            >

            <button>➤</button>

        </div>

    </main>

</div>

</body>
</html>
